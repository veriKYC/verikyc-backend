spring.application.name=repo-verikyc-backend

#spring.datasource.url=jdbc:postgresql://verikyc-db:5432/${POSTGRES_DB}
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB}}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiry=${JWT_EXPIRY_MS}